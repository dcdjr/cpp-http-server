<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ HTTP Server</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="page">
        <p class="eyebrow">cpp-http-server</p>
        <h1>Minimal HTTP server in C++</h1>
        <p class="lead">
            This server listens on port 8080 and serves files from the
            <code>static/</code> directory.
        </p>

        <section class="card">
            <h2>Try these routes</h2>
            <ul>
                <li><a href="/">/</a></li>
                <li><a href="/index.html">/index.html</a></li>
                <li><a href="/style.css">/style.css</a></li>
                <li><a href="/missing">/missing</a> (expected 404)</li>
            </ul>
        </section>
    </main>
</body>
</html>
